<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="减脂打卡"/>
<meta name="theme-color" content="#141418"/>
<title>减脂打卡</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23141418'/%3E%3Ctext y='.9em' font-size='70' x='10'%3E💪%3C/text%3E%3C/svg%3E"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#141418;--bg2:#1c1c22;--bg3:#242430;--bg4:#2c2c3a;
  --line:#2e2e3c;--line2:#383848;
  --text:#f0eee8;--text2:#b8b4ac;--muted:#686478;
  --red:#d94f2e;--red-dim:#3a1a12;
  --amber:#d4880a;--amber-dim:#2e200a;
  --steel:#4a7fa8;--steel-dim:#0e2030;
  --green:#3a9e6a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.header{flex-shrink:0;padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--line);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:.5}
.h-top{display:flex;justify-content:space-between;align-items:flex-start}
.h-label{font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;font-weight:600}
.h-title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}
.h-weight-cur{font-size:24px;font-weight:900;color:var(--amber);letter-spacing:-1px;line-height:1;text-align:right}
.h-weight-goal{font-size:11px;color:var(--muted);margin-top:3px;text-align:right}
.h-weight-goal strong{color:var(--text2)}
.progress-track{height:3px;background:var(--bg3);margin-top:12px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--steel),var(--red));transition:width .6s ease;position:relative}
.progress-fill::after{content:'';position:absolute;right:-1px;top:-2px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red)}
.progress-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px;font-weight:500}
.phase-pill{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:3px 10px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border-left:2px solid currentColor}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(62px + var(--safe-bottom))}
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(54px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(20,20,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:color .15s}
.nav-btn.active{color:var(--red)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.date-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:12px 10px 4px}
.date-cell{padding:8px 2px 9px;border-radius:4px;background:var(--bg2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .15s;text-align:center;position:relative;min-width:0}
.date-cell.active{background:var(--bg3);border-color:currentColor;border-width:1.5px}
.date-cell.today-marker::before{content:'';position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 4px var(--red)}
.dc-day{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
.dc-num{font-size:17px;font-weight:900;color:var(--text);margin-top:2px;letter-spacing:-.5px;line-height:1}
.dc-tag{font-size:8px;font-weight:800;letter-spacing:.2px;text-transform:uppercase;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.dc-dot{width:5px;height:5px;border-radius:50%;margin-top:4px}
.sec-label{font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;font-weight:700;padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.day-hero{margin:10px 14px;padding:16px 18px;border-radius:4px;border:1px solid var(--line2);border-left:3px solid currentColor;background:var(--bg2);display:flex;justify-content:space-between;align-items:center}
.day-hero-date{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-bottom:4px}
.day-hero-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.day-hero-sub{font-size:12px;margin-top:3px;font-weight:600}
.tag{padding:4px 9px;border-radius:2px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.ex-list{margin:0 14px 10px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--bg2)}
.ex-row{display:flex;align-items:center;padding:12px 14px;gap:10px;border-top:1px solid var(--line)}
.ex-row:first-child{border-top:none}
.ex-row.checked{background:var(--bg3)}
.check-box{width:22px;height:22px;border-radius:2px;border:1.5px solid var(--line2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.check-box.done{border-color:currentColor;background:currentColor}
.check-box.done::after{content:'✓';font-size:12px;font-weight:900;color:#fff;line-height:1}
.check-box.disabled{cursor:not-allowed;opacity:.35;border-style:dashed}
.check-box.disabled::after{content:'🔒';font-size:9px;opacity:.6}
.ex-info{flex:1;min-width:0;cursor:pointer}
.ex-name{font-size:13px;font-weight:700;color:var(--text);transition:color .15s}
.ex-name.done{color:var(--muted);text-decoration:line-through}
.ex-sets{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.ex-chevron{color:var(--muted);font-size:16px;font-weight:400;flex-shrink:0;padding:4px 2px;line-height:1}
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:var(--safe-top);padding-bottom:calc(20px + var(--safe-bottom));animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-top{display:flex;align-items:center;padding:14px 16px;gap:10px;border-bottom:1px solid var(--line);position:sticky;top:var(--safe-top);background:var(--bg);z-index:5}
.back-btn{background:none;border:none;color:var(--text);font-size:16px;cursor:pointer;padding:4px 8px;display:flex;align-items:center;gap:5px;font-weight:600}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.detail-hero{padding:18px 20px 20px;border-bottom:1px solid var(--line);background:var(--bg2)}
.detail-tag{display:inline-block;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;margin-bottom:10px}
.detail-name{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1.2}
.detail-sets{font-size:12px;color:var(--text2);margin-top:6px;font-weight:600;letter-spacing:.3px}
.detail-muscle{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600}
.detail-section{padding:18px 20px;border-bottom:1px solid var(--line)}
.detail-section-label{font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:12px}
.step{display:flex;gap:12px;margin-bottom:14px}
.step:last-child{margin-bottom:0}
.step-num{flex-shrink:0;width:24px;height:24px;border-radius:2px;background:var(--bg3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:currentColor}
.step-text{flex:1;font-size:13px;color:var(--text);line-height:1.7;padding-top:3px}
.cue-box{background:var(--bg2);border-left:3px solid currentColor;padding:12px 14px;margin-bottom:10px}
.cue-box:last-child{margin-bottom:0}
.cue-title{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;color:currentColor}
.cue-text{font-size:13px;color:var(--text2);line-height:1.6}
.warning-box{background:var(--red-dim);border-left:3px solid var(--red);padding:12px 14px}
.warning-title{font-size:11px;font-weight:800;color:var(--red);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.warning-text{font-size:13px;color:var(--text2);line-height:1.6}
.done-banner{margin:0 14px 10px;padding:12px 16px;border-radius:4px;border:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.done-banner.complete{border-color:var(--red);background:var(--red-dim)}
.rest-card{margin:14px;padding:36px 20px;text-align:center;background:var(--bg2);border:1px solid var(--line);border-radius:4px}
.rest-icon{font-size:44px;margin-bottom:12px}
.rest-title{font-size:17px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px}
.rest-text{font-size:13px;color:var(--text2);line-height:1.8}
.diet-wrap{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.diet-row{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-top:1px solid var(--line)}
.diet-row:first-child{border-top:none}
.diet-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.diet-label{font-size:11px;font-weight:800;color:var(--amber);margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.diet-text{font-size:12px;color:var(--text2);line-height:1.6}
.weight-card{margin:0 14px 10px;padding:16px;background:var(--bg2);border:1px solid var(--line);border-radius:4px}
.weight-big{font-size:34px;font-weight:900;color:var(--amber);letter-spacing:-2px;line-height:1}
.weight-big span{font-size:14px;color:var(--muted);font-weight:500;letter-spacing:0}
.w-input-row{display:flex;gap:8px;margin-top:12px}
.w-input{flex:1;padding:11px 14px;border-radius:3px;border:1px solid var(--line2);background:var(--bg3);color:var(--text);font-size:15px;font-weight:600;outline:none;-webkit-appearance:none}
.w-input:focus{border-color:var(--amber)}
.w-input::placeholder{color:var(--muted);font-weight:400}
.w-btn{padding:11px 20px;border-radius:3px;border:none;background:var(--red);color:#fff;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:.5px}
.w-edit{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 14px;margin-bottom:8px}
.stat-box{background:var(--bg2);border:1px solid var(--line);border-radius:4px;padding:14px 10px;text-align:center}
.stat-n{font-size:22px;font-weight:900;letter-spacing:-1px}
.stat-u{font-size:11px;color:var(--muted);font-weight:500}
.stat-l{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.chart-wrap{margin:0 14px 8px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.w-list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--line)}
.wk-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:0 14px;margin-bottom:8px}
.wk-cell{aspect-ratio:1;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--bg2)}
.wk-cell-n{font-size:11px;font-weight:800}
.wk-cell-dot{width:4px;height:4px;border-radius:50%;margin-top:2px}
.week-row{margin:0 14px 6px;display:flex;align-items:center;padding:12px 14px;gap:12px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;cursor:pointer}
.week-row.today{border-color:var(--red);border-left:3px solid var(--red)}
.wk-date-box{width:44px;height:44px;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg3)}
.wk-date-n{font-size:11px;font-weight:800}
.wk-date-d{font-size:9px;margin-top:1px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* AI ASSISTANT */
.ai-fab{position:fixed;right:16px;bottom:calc(70px + var(--safe-bottom));width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#4a7fa8,#7b4ea8);border:none;cursor:pointer;z-index:150;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(74,127,168,.55);transition:transform .15s}
.ai-fab:active{transform:scale(.9)}
.ai-fab-icon{font-size:22px}
.ai-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;display:flex;flex-direction:column;background:var(--bg);padding-top:var(--safe-top);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);flex-shrink:0}
.ai-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#4a7fa8,#7b4ea8);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-title{font-size:15px;font-weight:800;letter-spacing:-.3px;margin-left:10px}
.ai-subtitle{font-size:10px;color:var(--muted);margin-top:1px;font-weight:500;margin-left:10px}
.ai-close{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;padding:0 4px;line-height:1}
.ai-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 6px;display:flex;flex-direction:column;gap:10px}
.ai-msg{display:flex;flex-direction:column;max-width:90%}
.ai-msg.user{align-self:flex-end;align-items:flex-end}
.ai-msg.ai{align-self:flex-start;align-items:flex-start}
.ai-bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.65}
.ai-msg.user .ai-bubble{background:var(--steel);color:#fff;border-bottom-right-radius:4px}
.ai-msg.ai .ai-bubble{background:var(--bg2);border:1px solid var(--line);border-bottom-left-radius:4px;color:var(--text)}
.ai-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}
.ai-thinking{display:flex;gap:5px;padding:4px 2px;align-items:center}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:aiPulse 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes aiPulse{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-confirm{padding:12px 14px;background:var(--bg3);border:1px solid var(--line2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.65}
.ai-confirm-title{font-size:10px;font-weight:800;color:var(--amber);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.ai-confirm-btns{display:flex;gap:8px;margin-top:10px}
.ai-confirm-yes{flex:1;padding:9px;border-radius:4px;border:none;background:var(--green);color:#fff;font-weight:800;font-size:12px;cursor:pointer}
.ai-confirm-no{flex:1;padding:9px;border-radius:4px;border:1px solid var(--line2);background:transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer}
.ai-sugs{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding:8px 14px 4px;flex-shrink:0;scrollbar-width:none}
.ai-sugs::-webkit-scrollbar{display:none}
.ai-sug{padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--line2);font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500;flex-shrink:0}
.ai-input-row{display:flex;gap:8px;padding:8px 14px calc(8px + var(--safe-bottom));border-top:1px solid var(--line);flex-shrink:0;background:var(--bg)}
.ai-input{flex:1;padding:10px 14px;border-radius:22px;border:1px solid var(--line2);background:var(--bg3);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;resize:none;max-height:90px;font-family:inherit;line-height:1.4}
.ai-input:focus{border-color:#4a7fa8}
.ai-input::placeholder{color:var(--muted)}
.ai-send{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#4a7fa8,#7b4ea8);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-end}
.ai-send svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.ai-send:disabled{opacity:.4;cursor:not-allowed}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease both}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop{animation:pop .18s ease}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="h-top">
      <div><div class="h-label">12-Week Cut Program</div><div class="h-title">减脂打卡</div></div>
      <div><div class="h-weight-cur" id="cur-w">150斤</div><div class="h-weight-goal">目标 <strong>140斤</strong></div></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-nums"><span id="prog-pct">0%</span><span id="prog-lost">已减 0斤 / 目标10斤</span></div>
    <div id="phase-pill" class="phase-pill"></div>
  </div>
  <div class="content" id="content"></div>
  <button class="ai-fab" onclick="openAI()"><div class="ai-fab-icon">🤖</div></button>
  <nav class="nav">
    <button class="nav-btn active" id="nav-today" onclick="setView('today')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>今日
    </button>
    <button class="nav-btn" id="nav-week" onclick="setView('week')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>本周
    </button>
    <button class="nav-btn" id="nav-progress" onclick="setView('progress')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>记录
    </button>
  </nav>
</div>
<script>
const GLM_KEY='919aec23c4fa45c98a7978164ef72efc.pjv9MSzDh7BtUVv1';
const GLM_URL='https://open.bigmodel.cn/api/paas/v4/chat/completions';
const START=new Date(2026,3,22),START_KG=75,GOAL_KG=70;

const SCHED=[
  {dow:0,label:"MON",zh:"周一",type:"train",wk:0,color:"#d94f2e",dim:"#3a1a12",tag:"PUSH",title:"上肢推力 + 划船机HIIT"},
  {dow:1,label:"TUE",zh:"周二",type:"train",wk:1,color:"#4a7fa8",dim:"#0e2030",tag:"LEGS",title:"下肢力量 + 核心"},
  {dow:2,label:"WED",zh:"周三",type:"rest",wk:null,color:"#686478",dim:"#1c1c22",tag:"REST",title:"主动恢复日"},
  {dow:3,label:"THU",zh:"周四",type:"train",wk:2,color:"#3a9e6a",dim:"#0c2418",tag:"PULL",title:"背部拉力 + 手臂"},

function toKey(d){return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}
function getDow(d){const x=d.getDay();return x===0?6:x-1}
function getWeekNum(d){return Math.min(Math.max(Math.floor((d-START)/(864e5*7)),0),11)}
function getPhase(w){
  if(w<3)return{label:"PHASE 1 · ADAPT",color:"#4a7fa8"};
  if(w<7)return{label:"PHASE 2 · BUILD",color:"#c07030"};
  return{label:"PHASE 3 · CUT",color:"#d94f2e"};
}
function activeDate(){return viewingDate?parseKey(viewingDate):new Date()}
function activeKey(){return viewingDate||toKey(new Date())}

function updateHeader(){
  const today=new Date(),wn=getWeekNum(today),ph=getPhase(wn);
  const entries=Object.entries(weights).sort(([a],[b])=>parseKey(a)-parseKey(b));
  const latestKg=entries.length?entries[entries.length-1][1]:START_KG;
  const lost=+(START_KG-latestKg).toFixed(1),pct=Math.min(Math.max(lost/(START_KG-GOAL_KG)*100,0),100);
  document.getElementById('cur-w').textContent=(latestKg*2).toFixed(1)+'斤';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=`进度 ${pct.toFixed(0)}%`;

function setView(v){curView=v;viewingDate=null;detailEx=null;['today','week','progress'].forEach(x=>document.getElementById('nav-'+x).classList.toggle('active',x===v));render();}
function selectDate(dk){viewingDate=dk;render();}

function render(){
  updateHeader();

function renderDateStrip(){
  const today=new Date(),todayKey=toKey(today),actKey_=activeKey(),actDate=activeDate();
  const mon=new Date(actDate);mon.setDate(actDate.getDate()-getDow(actDate));

  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dk=toKey(d),sched=SCHED[i],isAct=dk===actKey_,isToday=dk===todayKey;
    const wo=sched.type==='train'?WO[sched.wk]:null,dayC=checks[dk]||{};
    const done=wo?Object.values(dayC).filter(Boolean).length:0,total=wo?wo.ex.length:0,allDone=wo&&done===total;
    h+=`<div class="date-cell ${isAct?'active':''} ${isToday?'today-marker':''}" style="color:${sched.color};${isAct?'border-color:'+sched.color:''}" onclick="selectDate('${dk}')">
      <div class="dc-day" style="${isAct?'color:'+sched.color:''}">${sched.label}</div>
      <div class="dc-num">${d.getDate()}</div>
      <div class="dc-tag" style="color:${sched.color}">${sched.tag}</div>
      <div class="dc-dot" style="background:${allDone?sched.color:(wo&&done>0?sched.color+'70':'transparent')}"></div>
    </div>`;
  }

}

      <div class="day-hero-sub" style="color:${sched.color}">${sched.type==='rest'?'主动恢复 / 充分休息':(isToday?'今日训练 — 上场':'训练计划')}</div>

        <text x="24" y="29" text-anchor="middle" fill="${sched.color}" font-size="11" font-weight="900">${Math.round(done/total*100)}%</text>

    h+=`<div class="sec-label"><span>训练动作</span><span style="color:var(--muted);font-size:9px;letter-spacing:2px">${isToday?'点击查看详细':'仅当天可打卡'}</span></div><div class="ex-list">`;
    wo.ex.forEach((ex,i)=>{

function renderWeek(){
  const today=new Date(),dk=toKey(today),mon=new Date(today);mon.setDate(today.getDate()-getDow(today));
  let h=`<div style="padding:16px 14px 4px;font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;font-weight:700">本周训练 · WK${getWeekNum(today)+1}</div><div style="padding:0 14px 10px;font-size:11px;color:var(--muted);font-weight:500">点击任意一天查看详细训练</div>`;
  for(let i=0;i<7;i++){

    const dayC=checks[ddk]||{},done=wo?Object.values(dayC).filter(Boolean).length:0,total=wo?wo.ex.length:0,allDone=wo&&done===total;
    const isToday=ddk===dk,isFuture=d>today,r=14,circ=2*Math.PI*r,offset=wo?circ*(1-done/total):circ;
    h+=`<div class="week-row ${isToday?'today':''}" style="opacity:${isFuture?.65:1}" onclick="setView('today');selectDate('${ddk}')">
      <div class="wk-date-box" style="background:${sched.dim}"><div class="wk-date-n" style="color:${sched.color}">${d.getMonth()+1}/${d.getDate()}</div><div class="wk-date-d" style="color:${sched.color}99">${sched.label}</div></div>

        <div style="font-size:11px;margin-top:3px;font-weight:500;color:${allDone?sched.color:'var(--muted)'}">

function renderProgress(){
  const today=new Date(),wn=getWeekNum(today);
  const entries=Object.entries(weights).sort(([a],[b])=>parseKey(a)-parseKey(b));
  const latestKg=entries.length?entries[entries.length-1][1]:START_KG;
  const lost=+(START_KG-latestKg).toFixed(1),pct=Math.min(Math.max(lost/(START_KG-GOAL_KG)*100,0),100);
  let trainDone=0;
  Object.keys(checks).forEach(dk=>{const d=parseKey(dk),s=SCHED[getDow(d)];if(s.type!=='train')return;const wo=WO[s.wk],dc=checks[dk]||{};if(Object.values(dc).filter(Boolean).length===wo.ex.length)trainDone++;});
  let h=`<div style="height:14px"></div><div class="stats-row">
    <div class="stat-box"><div class="stat-n" style="color:#d94f2e">${trainDone}<span class="stat-u"> 天</span></div><div class="stat-l">训练完成</div></div>
    <div class="stat-box"><div class="stat-n" style="color:#3a9e6a">${lost>0?(lost*2).toFixed(1):0}<span class="stat-u"> 斤</span></div><div class="stat-l">已减重</div></div>
    <div class="stat-box"><div class="stat-n" style="color:#d4880a">${pct.toFixed(0)}<span class="stat-u"> %</span></div><div class="stat-l">目标进度</div></div>
  </div><div class="sec-label">体重曲线</div><div class="chart-wrap">`;
  if(entries.length>1){
    const vals=entries.map(([,v])=>v),mn=Math.min(...vals,GOAL_KG)-.5,mx=Math.max(...vals)+.5,W=300,H=72;
    const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/(mx-mn))*H}`).join(' ');
    const goalY=H-((GOAL_KG-mn)/(mx-mn))*H;
    h+=`<div style="padding:14px 12px 6px"><svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible"><defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a7fa8"/><stop offset="100%" stop-color="#d94f2e"/></linearGradient></defs><line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#3a9e6a" stroke-width="1" stroke-dasharray="5,4" opacity=".4"/><polyline points="${pts}" fill="none" stroke="url(#cg)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1))*W;const y=H-((v-mn)/(mx-mn))*H;return`<circle cx="${x}" cy="${y}" r="3.5" fill="#d4880a"/>`;}).join('')}</svg><div style="font-size:9px;color:#3a9e6a55;text-align:right;padding-bottom:4px;letter-spacing:1px;text-transform:uppercase;font-weight:600">— TARGET 70kg</div></div>`;
  } else {h+=`<div style="padding:28px;text-align:center;color:var(--muted);font-size:13px">暂无体重数据</div>`;}
  if(entries.length>0)[...entries].reverse().slice(0,7).forEach(([dk,w],i)=>{const d=parseKey(dk),prevIdx=entries.length-1-i-1,prev=prevIdx>=0?entries[prevIdx][1]:null,diff=prev!==null?+(w-prev).toFixed(1):null;h+=`<div class="w-list-row"><div style="font-size:12px;color:var(--text2);font-weight:600">${d.getMonth()+1}月${d.getDate()}日</div><div style="display:flex;gap:10px;align-items:center">${diff!==null&&i<entries.length-1?`<span style="font-size:11px;font-weight:700;color:${diff<0?'#3a9e6a':'#d94f2e'}">${diff>0?'+':''}${(diff*2).toFixed(1)}斤</span>`:''}<span style="font-size:16px;font-weight:900;color:var(--amber)">${(w*2).toFixed(1)}斤</span><span style="font-size:11px;color:var(--muted)">${w}kg</span><button onclick="deleteWeight('${dk}')" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1">×</button></div></div>`;});
  h+=`</div><div class="sec-label">12周进度图</div><div class="wk-grid">`;
  for(let w=0;w<12;w++){const ph=getPhase(w),isCur=w===wn,isPast=w<wn;h+=`<div class="wk-cell" style="background:${isCur||isPast?ph.color+'18':'var(--bg2)'};border-color:${isCur?ph.color:(isPast?ph.color+'50':'var(--line)')}"><div class="wk-cell-n" style="color:${isCur?ph.color:(isPast?ph.color+'90':'var(--muted)')}">W${w+1}</div><div class="wk-cell-dot" style="background:${isCur?ph.color:(isPast?ph.color+'60':'var(--line2)')}"></div></div>`;}
  h+=`</div><div style="display:flex;gap:14px;padding:0 14px;margin-bottom:24px;flex-wrap:wrap">${[['#4a7fa8','W1-3','ADAPT'],['#c07030','W4-7','BUILD'],['#d94f2e','W8-12','CUT']].map(([c,w,l])=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:3px;height:14px;border-radius:2px;background:${c}"></div><span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px">${w} · ${l}</span></div>`).join('')}</div>`;
  return h;
}

function openDetail(wkIdx,exIdx){detailEx={wkIdx,exIdx};showDetail(detailEx);}
function showDetail({wkIdx,exIdx}){

function closeDetail(){const ov=document.getElementById('detail-overlay');if(ov)ov.remove();detailEx=null;}

function bindEvents(){
  const wi=document.getElementById('w-input');
  if(wi)wi.addEventListener('keydown',e=>{if(e.key==='Enter')saveWeight(toKey(new Date()));});
}
function toggleEx(box){
  const row=box.closest('.ex-row'),idx=parseInt(row.dataset.idx),dk=row.dataset.key;
  if(dk!==toKey(new Date()))return;
  if(!checks[dk])checks[dk]={};
  checks[dk][idx]=!checks[dk][idx];save('ftc',checks);
  box.classList.toggle('done',!!checks[dk][idx]);box.classList.add('pop');setTimeout(()=>box.classList.remove('pop'),180);
  row.querySelector('.ex-name').classList.toggle('done',!!checks[dk][idx]);
  row.classList.toggle('checked',!!checks[dk][idx]);
  render();
}
function saveWeight(dk){const inp=document.getElementById('w-input');if(!inp)return;const v=parseFloat(inp.value);if(isNaN(v)||v<40||v>200)return;weights[dk]=v;save('ftw',weights);render();}

function deleteWeight(dk){delete weights[dk];save('ftw',weights);render();}

用户：男，180cm，75kg，目标70kg，设备：划船机+力量器械+哑铃，无跑跳。

当用户要修改时，返回以下JSON（不包含其他任何文字）：
{"changes":{"workouts":{"wkIdx":[{"n":"动作名","s":"组数·次数","m":"目标肌群","steps":["步骤1","步骤2","步骤3","步骤4","步骤5"],"cues":[["要点名","内容"],["要点名","内容"],["要点名","内容"]],"warn":"警告"}]},"diet":[{"icon":"emoji","label":"标题","text":"内容"}],"schedTitles":{"dowIndex":"新标题"}},"explanation":"中文解释"}

规则：
- 只改用户要求的部分，其他保持不变
- 纯聊天或咨询时不要返回changes字段，只返回{"explanation":"回答内容"}
- 所有字段必须存在，JSON必须合法`;

  try{
    // Build GLM messages: system + history
    const glmMsgs=[{role:'system',content:sys},...aiHistory];
    const resp=await fetch(GLM_URL,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GLM_KEY},body:JSON.stringify({model:'glm-4-flash',messages:glmMsgs,temperature:0.7,max_tokens:3000})});
    const data=await resp.json();
    hideThinking();if(btn)btn.disabled=false;
    if(!resp.ok){addMsg('ai','⚠️ 请求失败，请检查网络后重试。');return;}
    const raw=data.choices?.[0]?.message?.content||'{}';
    aiHistory.push({role:'assistant',content:raw});
    let parsed=null;
    try{const m=raw.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);}catch(e){}
    if(!parsed){addMsg('ai','⚠️ 解析失败，请重试。');return;}

    if(parsed.changes){
      pendingChanges=parsed.changes;
      let preview=`<div class="ai-confirm"><div class="ai-confirm-title">📋 修改预览</div>`;
      preview+=`${(parsed.explanation||'').replace(/\n/g,'<br>')}<br><br>`;
      if(parsed.changes.workouts)Object.keys(parsed.changes.workouts).forEach(wi=>{const s=SCHED.find(x=>x.wk===parseInt(wi));const ne=parsed.changes.workouts[wi];preview+=`<strong>${s.zh}：</strong>${ne.map(e=>e.n).join(' / ')}<br>`;});
      if(parsed.changes.diet)preview+=`<strong>饮食建议：</strong>已更新${parsed.changes.diet.length}条<br>`;
      if(parsed.changes.schedTitles)Object.keys(parsed.changes.schedTitles).forEach(i=>{preview+=`<strong>${SCHED[parseInt(i)].zh}：</strong>${parsed.changes.schedTitles[i]}<br>`;});
      const cid='c'+Date.now();
      preview+=`<div class="ai-confirm-btns"><button class="ai-confirm-yes" onclick="applyChanges('${cid}')">✓ 确认应用</button><button class="ai-confirm-no" onclick="rejectChanges('${cid}')">取消</button></div></div>`;
      const msgs=document.getElementById('ai-msgs');
      if(msgs){const d=document.createElement('div');d.className='ai-msg ai';d.id=cid;d.innerHTML=`<div class="ai-bubble">${preview}</div><div class="ai-time">现在</div>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
    } else {
      addMsg('ai',(parsed.explanation||raw).replace(/\n/g,'<br>'));
    }
  }catch(err){hideThinking();if(btn)btn.disabled=false;addMsg('ai','⚠️ 错误：'+err.message);}
}

function applyChanges(cid){
  if(!pendingChanges)return;
  const c=pendingChanges;
  if(c.workouts)Object.keys(c.workouts).forEach(wi=>{const idx=parseInt(wi);if(WO[idx])WO[idx].ex=c.workouts[wi];});
  if(c.diet)DIET.splice(0,DIET.length,...c.diet);
  if(c.schedTitles)Object.keys(c.schedTitles).forEach(i=>{const idx=parseInt(i);if(SCHED[idx])SCHED[idx].title=c.schedTitles[i];});
  save('ftwo',WO.map(w=>w.ex));save('ftdiet',[...DIET]);save('ftsched',SCHED.map(s=>s.title));
  const card=document.getElementById(cid);
  if(card){const b=card.querySelector('.ai-bubble');if(b)b.innerHTML=`<span style="color:var(--green);font-weight:700">✓ 计划已更新！</span>`;}
  pendingChanges=null;
  render();
  addMsg('ai','计划已更新！去「今日」或「本周」查看新计划 💪');
}
function rejectChanges(cid){
  pendingChanges=null;
  const card=document.getElementById(cid);
  if(card){const b=card.querySelector('.ai-bubble');if(b)b.innerHTML=`<span style="color:var(--muted)">已取消，计划保持不变</span>`;}
  addMsg('ai','好的，有其他需要随时说！');
}

render();
</script>
</body>
</html>
